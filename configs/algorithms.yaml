pc_tetrad_01_boots100:
    algorithm_name: pc_tetrad
    test_or_score_name: conditional_gaussian_test
    algorithm_params:
        conflict_rule: 1
        depth: -1
        stable_fas: True
        guarantee_cpdag: False
    test_or_score_params:
        alpha: 0.01
        discretize: True
        num_categories_to_discretize: 3
        use_for_mc: False
    bootstrap_params:
        numberResampling: 10
        percent_resample_size: 100
        with_replacement: True
        add_original: True # Adds original graph as additional bootstrap. Extra run
        resampling_ensemble: 1 # Code for "preserved" strategy
        seed: 42


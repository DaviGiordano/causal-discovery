# PC algorithms

pc_tetrad_01:
    algorithm_name: pc_tetrad
    test_name: conditional_gaussian_test
    test_params:
        alpha: 0.01
    bootstrap_strategy: bootstrap100

pc_tetrad_05:
    algorithm_name: pc_tetrad
    test_name: conditional_gaussian_test
    test_params:
        alpha: 0.05
    bootstrap_strategy: bootstrap100

pc_tetrad_10:
    algorithm_name: pc_tetrad
    test_name: conditional_gaussian_test
    test_params:
        alpha: 0.10
    bootstrap_strategy: bootstrap100

# FGES algorithms (score-based)
fges_tetrad_pd1:
    algorithm_name: fges_tetrad
    score_name: conditional_gaussian_score
    score_params:
        penalty_discount: 1
    bootstrap_strategy: bootstrap100


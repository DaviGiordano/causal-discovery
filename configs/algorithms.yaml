    algorithm_name: fci
    algorithm_params:
        alpha: 0.05
        indep_test: kci

fci_kcigaussian_01:
    algorithm_name: fci
    algorithm_params:
        alpha: 0.1
        indep_test: kci

ges_bic:
    algorithm_name: ges
    algorithm_params:
        score_func: local_score_BIC

ges_margigeneral:
    algorithm_name: ges
    algorithm_params:
        score_func: local_score_marginal_general

grasp_bic:
    algorithm_name: grasp
    algorithm_params:
        score_func: local_score_BIC

grasp_margigeneral:
    algorithm_name: grasp
    algorithm_params:
        score_func: local_score_marginal_general

directlingam_pwling:
    algorithm_name: directlingam
    algorithm_params:
        measure: pwling

directlingam_kernel:
    algorithm_name: directlingam
    algorithm_params:
        measure: kernel

notears_default:
    algorithm_name: notears
    algorithm_params:
        lambda1: 0.01
        loss_type: l2
        max_iter: 100
        h_tol: 1e-8
        rho_max: 1e+16
        w_threshold: 0.3

